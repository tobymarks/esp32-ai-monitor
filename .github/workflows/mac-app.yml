name: Mac App Build

# Trigger nur auf App-Tags (app-v1.x.x), damit der macos-Runner nicht bei jedem
# Commit Zeit verbrennt. Manuell per `gh workflow run mac-app.yml` oder
# UI-Dispatch startbar — dann wird ohne Release-Upload nur das Bundle gebaut.
on:
  push:
    tags:
      - 'app-v*.*.*'
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: 'Upload ZIP+DMG zum vorhandenen Release (Tag manuell angeben)'
        required: false
        default: 'false'
      tag:
        description: 'Release-Tag (nur bei workflow_dispatch mit upload=true)'
        required: false

# contents: write wird fuer `gh release upload` gebraucht — ohne diese
# permission liefert die API 403 ('Resource not accessible by integration').
# Default-Repo-Permission bei Org-Repos ist oft nur 'read'.
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Install PlatformIO (fuer esptool-Bundle in AI Monitor.app)
        run: |
          # build.sh kopiert das PlatformIO-esptool-Package in die App-Bundle-
          # Resources. Ohne diesen Step faellt die gebaute App auf system-
          # installiertes esptool zurueck und das ZIP/DMG ist ~8x kleiner.
          python3 -m pip install --user --upgrade platformio
          python3 -m platformio platform install espressif32 || true

      - name: Build AI Monitor.app (ad-hoc signing)
        working-directory: companion-v2
        run: |
          # build.sh erzeugt /tmp/aimonitor-build/AI Monitor.app, kopiert nach
          # companion-v2/build/ und baut ZIP + DMG. Signing ist ad-hoc (codesign
          # --sign -), da Tobias einziger Nutzer ist und das Bundle vor dem
          # Start per xattr-Clean von der Quarantine befreit wird.
          ./build.sh

      - name: List build artifacts
        working-directory: companion-v2
        run: ls -lah build/

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIMonitor-zip
          path: companion-v2/build/AIMonitor.zip
          if-no-files-found: error

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIMonitor-dmg
          path: companion-v2/build/AIMonitor.dmg
          if-no-files-found: warn

      # Ab v1.13.0: Der CI-Build ist nur ad-hoc-signiert und würde manuell
      # hochgeladene, signierte + notarisierte + gestapelte Assets vom lokalen
      # Build überschreiben. Guard: Nur hochladen, wenn keine Release-Assets
      # existieren (= CI läuft vor dem manuellen Release-Upload) ODER wenn
      # explizit per workflow_dispatch mit upload_to_release=true getriggert.
      # Sobald Tobias die Signing-Secrets (.p12 Base64 + Notary-Creds) als
      # GitHub-Secrets hinterlegt, wird dieser Guard entfernt und CI übernimmt
      # Signing/Notarization komplett.
      - name: Attach assets to GitHub Release (guarded)
        if: startsWith(github.ref, 'refs/tags/app-v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Prüfe, ob AIMonitor.zip bereits als Release-Asset existiert. Wenn
          # ja: lokaler Build war zuerst da (signiert + stapled) — CI-Assets
          # NICHT überschreiben.
          if gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null | grep -q "^AIMonitor.zip$"; then
            echo "Release $TAG already has AIMonitor.zip — assuming stapled local build. Skipping CI upload."
            exit 0
          fi
          echo "No existing assets — uploading CI build to $TAG."
          gh release upload "$TAG" \
            companion-v2/build/AIMonitor.zip \
            companion-v2/build/AIMonitor.dmg \
            --clobber

name: Build & Deploy Installer

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'src/**'
      - 'platformio.ini'
      - 'installer/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.ref_type == 'tag' && format('release-{0}', github.ref_name) || 'pages' }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio esptool

      - name: Build firmware
        run: pio run

      - name: Merge binary (ILI9341)
        run: |
          mkdir -p installer/bin
          FIRMWARE_DIR=".pio/build/esp32dev"
          BOOT_APP0="$HOME/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin"

          esptool.py --chip esp32 merge_bin \
            -o installer/bin/ai-monitor.bin \
            --flash_mode dio \
            --flash_freq 40m \
            --flash_size 4MB \
            0x1000  "$FIRMWARE_DIR/bootloader.bin" \
            0x8000  "$FIRMWARE_DIR/partitions.bin" \
            0xe000  "$BOOT_APP0" \
            0x10000 "$FIRMWARE_DIR/firmware.bin"

      - name: Merge binary (ST7789)
        run: |
          mkdir -p installer/bin
          FIRMWARE_DIR=".pio/build/esp32dev-st7789"
          BOOT_APP0="$HOME/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin"

          esptool.py --chip esp32 merge_bin \
            -o installer/bin/ai-monitor-st7789.bin \
            --flash_mode dio \
            --flash_freq 40m \
            --flash_size 4MB \
            0x1000  "$FIRMWARE_DIR/bootloader.bin" \
            0x8000  "$FIRMWARE_DIR/partitions.bin" \
            0xe000  "$BOOT_APP0" \
            0x10000 "$FIRMWARE_DIR/firmware.bin"

      - name: Copy OTA binaries
        run: |
          cp .pio/build/esp32dev/firmware.bin installer/bin/firmware-ota.bin
          cp .pio/build/esp32dev-st7789/firmware.bin installer/bin/firmware-ota-st7789.bin

      - name: Update manifest version
        run: |
          VERSION=$(grep '#define APP_VERSION' src/config.h | head -1 | sed 's/.*"\(.*\)".*/\1/')
          python3 -c "
          import json
          for path in ('installer/manifest.json', 'installer/manifest-st7789.json'):
              with open(path, 'r') as f:
                  m = json.load(f)
              m['version'] = '$VERSION'
              with open(path, 'w') as f:
                  json.dump(m, f, indent=2)
                  f.write('\n')
          "

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: installer

      - name: Upload build artifacts for release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: firmware-binaries
          path: |
            installer/bin/ai-monitor.bin
            installer/bin/firmware-ota.bin
            installer/bin/ai-monitor-st7789.bin
            installer/bin/firmware-ota-st7789.bin

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download firmware binaries
        uses: actions/download-artifact@v4
        with:
          name: firmware-binaries
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/ai-monitor.bin
            release-assets/firmware-ota.bin
            release-assets/ai-monitor-st7789.bin
            release-assets/firmware-ota-st7789.bin

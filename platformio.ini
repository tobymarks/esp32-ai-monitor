; PlatformIO Project Configuration
; ESP32-2432S028R (CYD 2.8" ILI9341 + XPT2046 Touch)
; ESP32-2432S028  (CYD 2.8" ST7789  + XPT2046 Touch, Hybrid-Charge)
; AI Usage Monitor Dashboard

[env]
; Stable Arduino-ESP32 Core 2.x via Espressif32 6.13.0 — alte LEDC-Channel-API
; (ledcSetup / ledcAttachPin / ledcWrite) funktioniert hier zuverlaessig.
; Pfad A bestaetigt (v2.10.2): keine pioarduino-Migration noetig.
platform = espressif32@6.13.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800

board_build.partitions = min_spiffs.csv
extra_scripts = pre:scripts/remove_lvgl_asm.py

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@^9.1.0
    bblanchon/ArduinoJson@^7.0.0

; Shared TFT_eSPI / pin / LVGL flags (driver define is added per-env).
; WICHTIG: TFT_BL ist hier BEWUSST nicht definiert. Wir steuern das Backlight
; ausschliesslich selbst via PIN_TFT_BL (config.h) + LEDC Channel
; BACKLIGHT_LEDC_CHANNEL. Sonst greift sich TFT_eSPI den Pin beim tft.init()
; und ueberschreibt unsere LEDC-Config.
build_flags =
    -D USER_SETUP_LOADED=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    ; Display SPI pins (VSPI)
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    ; SPI frequencies
    -D SPI_FREQUENCY=55000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000
    ; Touch (XPT2046 via TFT_eSPI built-in support, shared SPI with different CS)
    -D TOUCH_CS=33
    -D TOUCH_MOSI=32
    -D TOUCH_MISO=39
    -D TOUCH_CLK=25
    ; Font loading
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    ; LVGL config
    -D LV_CONF_INCLUDE_SIMPLE=1
    -D LV_USE_TFT_ESPI=1
    -D LV_COLOR_DEPTH=16
    -D LV_USE_DRAW_SW_ASM=0
    ; Include lv_conf.h from project src/
    -I src

; Default build — CYD mit ILI9341-Controller (ESP32-2432S028R, R-Variante).
[env:esp32dev]
build_flags =
    ${env.build_flags}
    -D ILI9341_DRIVER=1

; Alternative build — CYD mit ST7789-Controller (Non-R-Hybrid-Charge:
; ST7789-Panel + CYD-R-Pinout inkl. XPT2046-SPI-Touch).
;
; v2.10.2 Finale Panel-Config (Multi-Phase-Test Phase 5 bestaetigt):
;   INV OFF, SWAP OFF (compile), BGR ON  -> TFT_RGB_ORDER=TFT_BGR.
; TFT_INVERSION_ON bleibt raus, kein compile-time Byte-Swap-Flag.
; TFT_BL bleibt raus (LEDC-Backlight, siehe [env]).
; LVGL disp_flush schreibt mit pushColors(..., true) passend dazu raus.
; Pin-Mapping stimmt 1:1 mit Sunton-Rv3-Referenz (MOSI=13, SCLK=14, CS=15,
; DC=2, RST=NC, BL=21, Touch MOSI=32/MISO=39/CLK=25/CS=33).
; Produziert separate ai-monitor-st7789.bin / firmware-ota-st7789.bin Assets.
[env:esp32dev-st7789]
build_flags =
    ${env.build_flags}
    -D ST7789_DRIVER=1

; PlatformIO Project Configuration
; ESP32-2432S028R (CYD 2.8" ILI9341 + XPT2046 Touch)
; AI Usage Monitor Dashboard

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = min_spiffs.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@^9.1.0
    bblanchon/ArduinoJson@^7.0.0
    tzapu/WiFiManager@^2.0.17
    paulstoffregen/XPT2046_Touchscreen@^1.4
    mathieucarbou/ESPAsyncWebServer@^3.6.0
    mathieucarbou/AsyncTCP@^3.3.2
    ricmoo/QRCode@^0.0.1

; TFT_eSPI build flags for CYD ESP32-2432S028R
build_flags =
    ; TFT_eSPI driver config
    -D USER_SETUP_LOADED=1
    -D ILI9341_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    ; Display SPI pins (VSPI)
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    ; SPI frequencies
    -D SPI_FREQUENCY=55000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000
    ; Touch CS (touch handled separately via XPT2046_Touchscreen)
    -D TOUCH_CS=33
    ; Font loading
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    ; LVGL config
    -D LV_CONF_INCLUDE_SIMPLE=1
    -D LV_USE_TFT_ESPI=1
    -D LV_COLOR_DEPTH=16
    ; Include lv_conf.h from project src/
    -I src

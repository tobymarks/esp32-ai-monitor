; PlatformIO Project Configuration
; ESP32-2432S028R (CYD 2.8" ILI9341 + XPT2046 Touch)
; AI Usage Monitor Dashboard

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800

board_build.partitions = min_spiffs.csv
extra_scripts = pre:scripts/remove_lvgl_asm.py

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@^9.1.0
    bblanchon/ArduinoJson@^7.0.0

; Shared TFT_eSPI / pin / LVGL flags (driver define is added per-env)
build_flags =
    -D USER_SETUP_LOADED=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    ; Display SPI pins (VSPI)
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    ; SPI frequencies
    -D SPI_FREQUENCY=55000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000
    ; Touch (XPT2046 via TFT_eSPI built-in support, shared SPI with different CS)
    -D TOUCH_CS=33
    -D TOUCH_MOSI=32
    -D TOUCH_MISO=39
    -D TOUCH_CLK=25
    ; Font loading
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    ; LVGL config
    -D LV_CONF_INCLUDE_SIMPLE=1
    -D LV_USE_TFT_ESPI=1
    -D LV_COLOR_DEPTH=16
    -D LV_USE_DRAW_SW_ASM=0
    ; Include lv_conf.h from project src/
    -I src

; Default build — CYD with ILI9341 display controller (original v2.10.0 asset).
[env:esp32dev]
build_flags =
    ${env.build_flags}
    -D ILI9341_DRIVER=1

; Alternative build — CYD with ST7789 display controller (newer board batches).
; Produces separate ai-monitor-st7789.bin / firmware-ota-st7789.bin assets.
; TFT_INVERSION_ON is required for the CYD-ST7789 variant (panel uses inverted
; colors vs. ILI9341) — otherwise colors come out negative.
[env:esp32dev-st7789]
build_flags =
    ${env.build_flags}
    -D ST7789_DRIVER=1
    -D TFT_RGB_ORDER=TFT_BGR
    -D TFT_INVERSION_ON=1
